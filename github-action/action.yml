name: 'RepoSage AI Copilot Reviewer'
description: 'AI-powered Pull Request reviewer that automatically reviews changes, detects bugs, scans security vulnerabilities, and posts inline suggestions.'
author: 'RepoSage GSSoC'
branding:
  icon: 'aperture'
  color: 'purple'
inputs:
  github-token:
    description: 'The GitHub token (e.g., secrets.GITHUB_TOKEN) used to fetch PR data and post comments.'
    required: true
  groq-api-key:
    description: 'The Groq API key used for code analysis and review.'
    required: true
  exclude-paths:
    description: 'Glob patterns to exclude from analysis (comma-separated). Supports **, *, and ? wildcards.'
    required: false
    default: 'package-lock.json,yarn.lock,pnpm-lock.yaml,dist/**,build/**'
  include-extensions:
    description: 'Comma-separated list of file extensions to review. Overrides default list if provided.'
    required: false
    default: ''
  max-tokens:
    description: 'Maximum tokens for the AI model response.'
    required: false
    default: '4096'
  auto-approve:
    description: 'Whether to automatically approve PRs with no issues found.'
    required: false
    default: 'false'
  pinecone-api-key:
    description: 'The Pinecone API key used for RAG global repository context (optional).'
    required: false
  pinecone-index-name:
    description: 'The Pinecone Index Name for fetching context embeddings (optional).'
    required: false
  openai-api-key:
    description: 'The OpenAI API key to generate embeddings for RAG (optional).'
    required: false
  fallback-provider:
    description: 'The fallback LLM provider to use if Groq fails (openai or anthropic).'
    required: false
  fallback-model:
    description: 'The fallback model ID to use (e.g., gpt-4o-mini, claude-3-haiku-20240307).'
    required: false
  fallback-api-key:
    description: 'The API key for the fallback provider.'
    required: false
  redis-url:
    description: 'Redis connection string (e.g. redis://...) for semantic caching of LLM requests.'
    required: false
  sarif-path:
    description: 'Path to a generated SARIF file from a previous SAST job to inject as baseline findings.'
    required: false
  coverage-path:
    description: 'Path to an lcov.info file to cross-reference test coverage.'
    required: false
runs:
  using: 'node20'
  main: 'dist/index.js'
